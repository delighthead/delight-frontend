<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Delight International School</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <section class="login-section">
    <div class="login-box">
      <h1>Forgot Password</h1>
      <p>Verify your account using your Ghana Card and phone number.</p>

      <form id="forgotVerifyForm">
        <div>
          <label>Role</label>
          <select id="forgot_role" required>
            <option value="">Select role</option>
            <option value="parent">Parent</option>
            <option value="teacher">Teacher</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div>
          <label>Ghana Card Number</label>
          <input type="text" id="forgot_username" placeholder="Example: GHA-111111111-1" required>
        </div>

        <div>
          <label>Phone Number</label>
          <input type="text" id="forgot_phone" placeholder="Enter phone number" required>
        </div>

        <button type="submit">Verify Account</button>
      </form>

      <form id="forgotResetForm" style="display:none; margin-top:20px;">
        <h2>Set New Password</h2>
        <input type="hidden" id="forgot_user_id">

        <div>
          <label>New Password</label>
          <input type="password" id="new_password" required>
        </div>

        <div>
          <label>Confirm Password</label>
          <input type="password" id="confirm_password" required>
        </div>

        <button type="submit">Reset Password</button>
      </form>

      <p style="margin-top:15px;">
        <a href="login.html">Back to Login</a>
      </p>

      <p id="forgotMessage" style="font-weight:bold;"></p>
    </div>
  </section>

  <script src="../js/forgot-password.js?v=2"></script>
  <script src="../js/site-footer-settings.js?v=1"></script>
  <script src="../js/site-settings.js?v=4"></script>
</body>
</html>
